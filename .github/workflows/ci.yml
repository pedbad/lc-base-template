name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint)
        run: bun run lint

      - name: Lint styles (Stylelint)
        run: bun run lint:css

      - name: Check formatting (Prettier)
        run: bun run format:check

      - name: Test (bun test)
        run: bun test

      - name: Build (tsc + vite)
        run: bun run build
